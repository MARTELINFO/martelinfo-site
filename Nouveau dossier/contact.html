<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - MARTELINFO</title>
<style>
/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f8ff;
    color: #222;
}

/* ===== HEADER ===== */
header {
    background: #005bbb;
    color: white;
    padding: 20px;
    display: flex;              /* Flexbox pour centrer logo + texte */
    flex-direction: column;     /* logo puis texte en colonne */
    align-items: center;        /* centre horizontalement */
    justify-content: center;
    text-align: center;
}

header img {
    max-width: 180px;
    height: auto;
    margin-bottom: 10px;        /* espace sous le logo */
}

header h2 {
    margin: 0;
    color: white;
    font-size: 24px;
    text-align: center;
}

/* ===== NAVIGATION ===== */
nav {
    background: #003f80;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

/* ===== CONTENU ===== */
.container {
    max-width: 950px;       /* largeur fixe du fond blanc */
    margin: 40px auto;
    background: white;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    color: #005bbb;
    margin-bottom: 20px;
}

h2 {
    margin-top: 35px;
    color: #003f80;
    border-left: 4px solid #005bbb;
    padding-left: 10px;
}

p, li {
    line-height: 1.7;
    font-size: 15px;
}

ul {
    margin-left: 20px;
}

/* ===== ENCADRÉ BAS DROIT ===== */
.local-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg,#005bbb,#007bff);
    color: white;
    padding: 20px 22px;
    border-radius: 16px;
    font-size: 14px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    z-index: 1000;
    animation: floatBox 3s ease-in-out infinite;
    transition: transform 0.3s ease;
    width: 260px;
}

.local-box:hover { transform: translateY(-6px); }

.availability-badge {
    position: absolute;
    top: -12px;
    left: 20px;
    background: #00c853;
    color: white;
    font-size: 12px;
    font-weight: bold;
    padding: 5px 12px;
    border-radius: 20px;
    animation: pulse 2s infinite;
}

.call-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 9px 16px;
    background: white;
    color: #005bbb;
    font-weight: bold;
    border-radius: 25px;
    text-decoration: none;
    transition: all 0.3s ease;
}

.call-btn:hover {
    background: #e6f0ff;
    transform: scale(1.07);
}

/* ===== FOOTER ===== */
footer {
    background:#003f80;
    color:white;
    padding:20px 15px;
    text-align:center;
    font-size:14px;
    box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

/* ===== ANIMATIONS ===== */
@keyframes floatBox {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,200,83,0.6); }
    70% { box-shadow: 0 0 0 10px rgba(0,200,83,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,200,83,0); }
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    .local-box {
        position: static;
        margin:30px auto;
        width:90%;
        text-align:center;
        animation:none;
    }
    .availability-badge {
        position: static;
        display:inline-block;
        margin-bottom:10px;
    }
    header img {
        max-width: 140px;
    }
    header h2 {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo MARTELINFO">
    <h2>MARTELINFO</h2>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <form id="contactForm">
        <input type="text" name="nom" placeholder="Nom" required>
        <input type="text" name="prenom" placeholder="Prénom" required>
        <input type="email" name="email" placeholder="Adresse mail" required>
        <input type="text" name="telephone" placeholder="Téléphone">
        <input type="text" name="ville" placeholder="Ville">
        <textarea name="message" rows="5" placeholder="Votre demande..." required></textarea>
        <button type="submit">Envoyer la demande</button>
    </form>
</div>

<div class="local-box">
    <div class="availability-badge">Disponible 7j/7</div>
    <strong>Entreprise locale – Cher & Nièvre</strong><br>
    18140<br>
    07.44.98.17.66
    <br><br>
    <a href="tel:0744981766" class="call-btn">📞 Appeler maintenant</a>
</div>

<!-- ===== SCRIPT POUR ENVOI + REDIRECTION ===== -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault(); // empêche l'envoi classique

    const formData = new FormData(this);

    fetch("https://formspree.io/f/TON_ID_FORMSPREE", {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
    })
    .then(response => {
        if (response.ok) {
            // Redirection directe vers merci.html
            window.location.href = "merci.html";
        } else {
            alert("Erreur lors de l'envoi, réessayez plus tard.");
        }
    })
    .catch(() => alert("Erreur réseau, réessayez plus tard."));
});
</script>

</body>
</html>
